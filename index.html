<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Raiders</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
  #arcade-root {
    background: #000; font-family: 'Press Start 2P', monospace; color: #fff;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px; min-height: 640px; position: relative; overflow: hidden; width: 512px;
  }
  .scanlines { position: absolute; inset: 0; pointer-events: none; z-index: 50;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px); }
  #game-title { color: #FFD700; font-size: 18px; text-shadow: 0 0 10px #FFD700, 2px 2px 0 #B8860B;
    margin: 8px 0 4px; letter-spacing: 2px; position: relative; z-index: 10; }
  .subtitle { font-size: 7px; color: #888; margin-bottom: 12px; position: relative; z-index: 10; }
  #hud { display: flex; gap: 24px; font-size: 8px; color: #0f0; margin-bottom: 8px; position: relative; z-index: 10; }
  #hud span { color: #fff; }
  #canvas-wrap { border: 2px solid #333; position: relative; z-index: 10; box-shadow: 0 0 30px rgba(0,200,255,0.15); }
  canvas { display: block; background: transparent; }
  #lives-row { display: flex; gap: 6px; margin: 6px 0; position: relative; z-index: 10; }
  .life-ship { font-size: 14px; }
  #msg-overlay { position: absolute; inset: 0; z-index: 40; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: rgba(0,0,0,0.88); padding: 20px; }
  .msg-title { font-size: 16px; color: #FFD700; text-shadow: 0 0 8px #FFD700; margin-bottom: 16px; text-align: center; line-height: 1.8; }
  .msg-sub { font-size: 7px; color: #aaa; margin-bottom: 20px; text-align: center; line-height: 2.2; }
  .arcade-btn { font-family: 'Press Start 2P', monospace; font-size: 9px; background: transparent;
    color: #0ff; border: 2px solid #0ff; padding: 10px 20px; cursor: pointer;
    text-shadow: 0 0 6px #0ff; transition: all 0.1s; margin: 4px; }
  .arcade-btn:hover { background: #0ff; color: #000; }
  .arcade-btn.gold { color: #FFD700; border-color: #FFD700; text-shadow: 0 0 6px #FFD700; }
  .arcade-btn.gold:hover { background: #FFD700; color: #000; }
  #payment-overlay { position: absolute; inset: 0; z-index: 45; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: rgba(0,0,0,0.95); gap: 12px; padding: 20px; }
  .coin-box { border: 2px solid #FFD700; padding: 20px 24px; text-align: center; max-width: 360px; width: 100%; }
  .coin-icon { font-size: 28px; margin-bottom: 8px; display: block; }
  .coin-title { font-size: 11px; color: #FFD700; margin-bottom: 14px; }
  #card-element { background: #111; border: 1px solid #444; padding: 10px; margin-bottom: 10px; border-radius: 2px; min-height: 40px; }
  #card-element.focused { border-color: #0ff; }
  #pay-now-btn { font-family: 'Press Start 2P', monospace; font-size: 9px; background: #635BFF;
    color: #fff; border: none; padding: 12px; cursor: pointer; width: 100%; margin-top: 4px; }
  #pay-now-btn:hover:not(:disabled) { background: #7A73FF; }
  #pay-now-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  #payment-msg { font-size: 7px; text-align: center; min-height: 16px; margin-top: 6px; }
  .stripe-badge { font-size: 6px; color: #444; margin-top: 8px; }
  #admin-row { display: flex; gap: 8px; align-items: center; width: 100%; max-width: 360px; }
  #admin-input { font-family: 'Press Start 2P', monospace; font-size: 7px; background: #111;
    border: 1px solid #333; color: #0f0; padding: 8px 10px; flex: 1; outline: none; }
  #admin-input:focus { border-color: #0f0; }
  #admin-input::placeholder { color: #333; }
  #admin-submit { font-family: 'Press Start 2P', monospace; font-size: 7px; background: transparent;
    color: #555; border: 1px solid #333; padding: 8px 10px; cursor: pointer; }
  #admin-submit:hover { border-color: #0f0; color: #0f0; }
  #admin-msg { font-size: 6px; text-align: center; min-height: 12px; }
  #wave-banner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 35; text-align: center; pointer-events: none; display: none; }
  #wave-banner .wt { font-size: 20px; color: #FFD700; text-shadow: 0 0 12px #FFD700; }
  #wave-banner .ws { font-size: 9px; color: #0ff; margin-top: 8px; }
  #score-flash-layer { position: absolute; inset: 0; pointer-events: none; z-index: 20; }
  .blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="arcade-root">
  <div class="scanlines"></div>
  <canvas id="stars-canvas" width="480" height="580" style="position:absolute;top:0;left:0;z-index:1;"></canvas>
  <div id="game-title">★ PIXEL RAIDERS ★</div>
  <div class="subtitle">INSERT COIN TO PLAY</div>
  <div id="hud">
    <div>SCORE: <span id="score-disp">0</span></div>
    <div>HI: <span id="hi-disp">0</span></div>
    <div>WAVE: <span id="wave-disp">1</span></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="gc" width="480" height="420"></canvas>
    <div id="wave-banner"><div class="wt" id="wave-banner-text"></div><div class="ws" id="wave-banner-sub"></div></div>
    <div id="score-flash-layer"></div>
  </div>
  <div id="lives-row"></div>

  <div id="msg-overlay">
    <div class="msg-title">★ PIXEL RAIDERS ★</div>
    <div class="msg-sub">DEFEND EARTH FROM THE<br>ALIEN PIXEL ARMADA!<br><br>← → or A D = MOVE<br>SPACE or ↑ = FIRE</div>
    <button class="arcade-btn gold blink" id="insert-coin-btn">▶ INSERT COIN — £1.00</button>
    <div style="margin-top:10px;font-size:6px;color:#333;">SECURED BY STRIPE</div>
  </div>

  <div id="payment-overlay" style="display:none;">
    <div class="coin-box">
      <span class="coin-icon">🪙</span>
      <div class="coin-title">INSERT COIN — £1.00</div>
      <div id="card-element">Loading secure card form...</div>
      <button id="pay-now-btn" disabled>▶ PAY £1.00 & PLAY</button>
      <div id="payment-msg"></div>
      <div class="stripe-badge">🔒 SECURED BY STRIPE — CARD NEVER TOUCHES THIS SERVER</div>
    </div>
    <div id="admin-row">
      <input id="admin-input" type="password" placeholder="HAVE A CODE?" maxlength="30" />
      <button id="admin-submit">ENTER</button>
    </div>
    <div id="admin-msg"></div>
    <button class="arcade-btn" id="back-btn" style="font-size:7px;">← BACK</button>
  </div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
const STRIPE_PK = 'pk_live_51T9WBnGVZkl8yJWYqPM7IEPpzClXNRCg8or9Kz1ZBvQA7lVK9nyEgSwXH2T6V8nfhD6ybdcICuNoiGeGy47wLjy6000T78CE48';
const SERVER = 'https://pixel-raiders-server.onrender.com';

function hashCode(str){ let h=0; for(let i=0;i<str.length;i++) h=(Math.imul(31,h)+str.charCodeAt(i))|0; return h; }
const ADMIN_HASH = hashCode('maximisapotato');

const W=480,H=420;
const gc=document.getElementById('gc');
const ctx=gc.getContext('2d');
let state='title',score=0,hiScore=0,lives=3,wave=1;
let player,bullets,enemies,enemyBullets,explosions;
let keys={},lastShot=0,enemyDir=1,enemyMoveTimer=0,enemyShootTimer=0,raf;
let waveTransitioning=false;
const PW=28,PH=18,EW=24,EH=18,BW=3,BH=10;
let stripe,cardElement;

function initStripe(){
  stripe=Stripe(STRIPE_PK);
  const elements=stripe.elements();
  cardElement=elements.create('card',{
    style:{
      base:{fontFamily:'"Press Start 2P",monospace',fontSize:'11px',color:'#00FF00','::placeholder':{color:'#444'},iconColor:'#0ff'},
      invalid:{color:'#FF4400'}
    }
  });
  cardElement.mount('#card-element');
  cardElement.on('ready',()=>{ document.getElementById('pay-now-btn').disabled=false; });
  cardElement.on('focus',()=>{ document.getElementById('card-element').classList.add('focused'); });
  cardElement.on('blur',()=>{ document.getElementById('card-element').classList.remove('focused'); });
}

async function handlePayment(){
  const btn=document.getElementById('pay-now-btn');
  const msg=document.getElementById('payment-msg');
  btn.disabled=true; btn.textContent='● PROCESSING...';
  msg.style.color='#aaa'; msg.textContent='Contacting payment server...';
  try {
    const r=await fetch(SERVER+'/create-payment',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    const data=await r.json();
    if(!data.clientSecret) throw new Error('No client secret');
    msg.textContent='Confirming with Stripe...';
    const result=await stripe.confirmCardPayment(data.clientSecret,{payment_method:{card:cardElement}});
    if(result.error){
      msg.style.color='#FF4400'; msg.textContent='✗ '+result.error.message;
      btn.disabled=false; btn.textContent='▶ TRY AGAIN';
    } else if(result.paymentIntent&&result.paymentIntent.status==='succeeded'){
      msg.style.color='#0f0'; msg.textContent='✓ PAYMENT CONFIRMED!';
      btn.textContent='✓ PAID';
      setTimeout(()=>launchGame(),700);
    } else {
      msg.style.color='#FF4400'; msg.textContent='✗ PAYMENT NOT CONFIRMED. TRY AGAIN.';
      btn.disabled=false; btn.textContent='▶ TRY AGAIN';
    }
  } catch(e){
    msg.style.color='#FF4400'; msg.textContent='✗ SERVER ERROR. TRY AGAIN.';
    btn.disabled=false; btn.textContent='▶ PAY £1.00 & PLAY';
  }
}

function launchGame(){
  document.getElementById('payment-overlay').style.display='none';
  cancelAnimationFrame(raf); initGame(); raf=requestAnimationFrame(loop);
}

function initGame(){ score=0;lives=3;wave=1;waveTransitioning=false;spawnWave();state='playing';updateHUD(); }

function spawnWave(){
  player={x:W/2-PW/2,y:H-50,w:PW,h:PH,invincible:0};
  bullets=[];enemyBullets=[];explosions=[];enemies=[];
  for(let r=0;r<4;r++) for(let c=0;c<9;c++)
    enemies.push({x:48+c*44,y:30+r*36,w:EW,h:EH,type:r<1?2:r<3?1:0,alive:true,anim:0});
  enemyDir=1;enemyMoveTimer=0;enemyShootTimer=0;
}

function showWaveBanner(num,cb){
  waveTransitioning=true;
  let banner=document.getElementById('wave-banner');
  document.getElementById('wave-banner-text').textContent='WAVE '+num;
  document.getElementById('wave-banner-sub').textContent=num===1?'GOOD LUCK!':'INCOMING!';
  banner.style.display='block';banner.style.opacity='1';
  setTimeout(()=>{
    let start=Date.now();
    let fade=setInterval(()=>{
      let t=(Date.now()-start)/600;banner.style.opacity=Math.max(0,1-t);
      if(t>=1){clearInterval(fade);banner.style.display='none';waveTransitioning=false;if(cb)cb();}
    },16);
  },1400);
}

function drawPlayer(p){
  if(p.invincible>0&&Math.floor(Date.now()/80)%2===0)return;
  ctx.fillStyle='#00FFFF';
  ctx.fillRect(p.x+12,p.y,4,4);ctx.fillRect(p.x+8,p.y+4,12,3);
  ctx.fillRect(p.x+4,p.y+7,20,5);ctx.fillRect(p.x,p.y+12,28,4);
  ctx.fillRect(p.x,p.y+14,6,4);ctx.fillRect(p.x+22,p.y+14,6,4);
  ctx.fillStyle='#0088FF';ctx.fillRect(p.x+10,p.y+4,8,3);
  ctx.fillStyle='#FF4400';
  ctx.fillRect(p.x+10,p.y+16,4,2);ctx.fillRect(p.x+14,p.y+16,4,2);
  ctx.fillRect(p.x+2,p.y+16,3,2);ctx.fillRect(p.x+23,p.y+16,3,2);
}

function drawEnemy(e){
  let a=e.anim;
  if(e.type===2){
    ctx.fillStyle='#FF00FF';
    if(a===0){ctx.fillRect(e.x+8,e.y,8,4);ctx.fillRect(e.x+4,e.y+4,16,4);ctx.fillRect(e.x,e.y+8,24,4);ctx.fillRect(e.x+4,e.y+12,4,4);ctx.fillRect(e.x+16,e.y+12,4,4);ctx.fillRect(e.x,e.y+4,2,2);ctx.fillRect(e.x+22,e.y+4,2,2);}
    else{ctx.fillRect(e.x+8,e.y,8,4);ctx.fillRect(e.x+4,e.y+4,16,4);ctx.fillRect(e.x+2,e.y+8,20,4);ctx.fillRect(e.x,e.y+12,6,4);ctx.fillRect(e.x+18,e.y+12,6,4);}
  } else if(e.type===1){
    ctx.fillStyle='#00FF88';
    ctx.fillRect(e.x+4,e.y,4,4);ctx.fillRect(e.x+16,e.y,4,4);ctx.fillRect(e.x,e.y+4,24,4);ctx.fillRect(e.x+4,e.y+8,16,4);ctx.fillRect(e.x+2,e.y+12,6,4);ctx.fillRect(e.x+16,e.y+12,6,4);
    if(a===0){ctx.fillRect(e.x,e.y+4,2,2);ctx.fillRect(e.x+22,e.y+4,2,2);}else{ctx.fillRect(e.x-2,e.y+8,2,2);ctx.fillRect(e.x+24,e.y+8,2,2);}
  } else {
    ctx.fillStyle='#FFAA00';
    ctx.fillRect(e.x+8,e.y,8,4);ctx.fillRect(e.x+4,e.y+4,16,4);ctx.fillRect(e.x,e.y+8,24,6);ctx.fillRect(e.x+2,e.y+12,8,4);ctx.fillRect(e.x+14,e.y+12,8,4);
    if(a===0){ctx.fillRect(e.x-2,e.y+10,2,2);ctx.fillRect(e.x+24,e.y+10,2,2);}else{ctx.fillRect(e.x+2,e.y+6,2,2);ctx.fillRect(e.x+20,e.y+6,2,2);}
  }
  ctx.fillStyle='#FF2200';ctx.fillRect(e.x+8,e.y+4,3,3);ctx.fillRect(e.x+13,e.y+4,3,3);
}

function drawExplosion(e){
  let t=e.t/e.maxT,r=e.r*t;ctx.globalAlpha=1-t;
  ctx.fillStyle=t<0.3?'#FFFFFF':t<0.6?'#FFFF00':'#FF4400';
  for(let i=0;i<8;i++){let ang=(i/8)*Math.PI*2,pr=r*(0.5+Math.random()*0.5);ctx.fillRect(e.x+Math.cos(ang)*pr,e.y+Math.sin(ang)*pr,4,4);}
  ctx.globalAlpha=1;
}

function loop(ts){
  if(state!=='playing')return;
  ctx.clearRect(0,0,W,H);
  if(!waveTransitioning){
    let spd=2+wave*0.5;
    if(keys['ArrowLeft']||keys['a']||keys['A'])player.x=Math.max(0,player.x-spd);
    if(keys['ArrowRight']||keys['d']||keys['D'])player.x=Math.min(W-player.w,player.x+spd);
    if((keys[' ']||keys['ArrowUp']||keys['w']||keys['W'])&&ts-lastShot>280){bullets.push({x:player.x+player.w/2-BW/2,y:player.y,vy:-9});lastShot=ts;}
    bullets.forEach(b=>b.y+=b.vy);
    enemyBullets.forEach(b=>b.y+=b.vy);
    if(player.invincible>0)player.invincible--;
    enemyMoveTimer++;
    let alive=enemies.filter(e=>e.alive);
    let mi=Math.max(3,20-wave*2-Math.floor((36-alive.length)/6));
    if(enemyMoveTimer>=mi){
      enemyMoveTimer=0;
      enemies.forEach(e=>{if(e.alive){e.x+=12*enemyDir;e.anim=1-e.anim;}});
      let minX=Math.min(...alive.map(e=>e.x)),maxX=Math.max(...alive.map(e=>e.x+e.w));
      if(maxX>W-8||minX<8){enemyDir*=-1;enemies.forEach(e=>{if(e.alive)e.y+=14;});}
      if(alive.length>0){let by=Math.max(...alive.map(e=>e.y+e.h));if(by>=player.y){gameOver();return;}}
    }
    enemyShootTimer++;
    if(enemyShootTimer>Math.max(25,80-wave*8)){
      enemyShootTimer=0;
      if(alive.length>0){let s=alive[Math.floor(Math.random()*alive.length)];enemyBullets.push({x:s.x+s.w/2-BW/2,y:s.y+s.h,vy:4+wave*0.6});}
    }
    bullets.forEach(b=>{
      enemies.forEach(e=>{
        if(!e.alive||b.y<-10)return;
        if(b.x<e.x+e.w&&b.x+BW>e.x&&b.y<e.y+e.h&&b.y+BH>e.y){
          e.alive=false;b.y=-200;
          let pts=(e.type===2?30:e.type===1?20:10)*wave;
          score+=pts;if(score>hiScore)hiScore=score;
          explosions.push({x:e.x+e.w/2,y:e.y+e.h/2,r:20,t:0,maxT:18});
          updateHUD();flashScore(e.x,e.y,'+'+pts);
        }
      });
    });
    enemyBullets.forEach(b=>{
      if(player.invincible>0)return;
      if(b.x<player.x+player.w&&b.x+BW>player.x&&b.y<player.y+player.h&&b.y+BH>player.y){
        b.y=H+100;lives--;player.invincible=120;
        explosions.push({x:player.x+player.w/2,y:player.y+player.h/2,r:24,t:0,maxT:22});
        updateHUD();if(lives<=0){gameOver();return;}
      }
    });
    let remaining=enemies.filter(e=>e.alive);
    if(remaining.length===0&&!waveTransitioning){
      waveTransitioning=true;wave++;updateHUD();
      setTimeout(()=>{spawnWave();showWaveBanner(wave,()=>{waveTransitioning=false;});},400);
    }
  }
  bullets=bullets.filter(b=>b.y>-20);
  enemyBullets=enemyBullets.filter(b=>b.y<H+20);
  explosions.forEach(e=>e.t++);
  explosions=explosions.filter(e=>e.t<e.maxT);
  enemies.forEach(e=>{if(e.alive)drawEnemy(e);});
  bullets.forEach(b=>{ctx.fillStyle='#FFFF00';ctx.fillRect(b.x,b.y,BW,BH);});
  enemyBullets.forEach(b=>{ctx.fillStyle='#FF4400';ctx.fillRect(b.x,b.y,BW,BH+2);});
  explosions.forEach(e=>drawExplosion(e));
  drawPlayer(player);
  ctx.fillStyle='rgba(0,255,0,0.12)';ctx.fillRect(0,H-2,W,2);
  raf=requestAnimationFrame(loop);
}

function gameOver(){
  state='gameover';cancelAnimationFrame(raf);
  if(score>hiScore)hiScore=score;updateHUD();
  let o=document.getElementById('msg-overlay');
  o.style.display='flex';
  o.innerHTML=`<div class="msg-title">GAME OVER</div>
    <div class="msg-sub">SCORE: ${score}<br>HI-SCORE: ${hiScore}<br><br>WAVE REACHED: ${wave}</div>
    <button class="arcade-btn gold blink" onclick="startNewGame()">▶ PLAY AGAIN (FREE)</button>`;
}

function startNewGame(){
  document.getElementById('msg-overlay').style.display='none';
  cancelAnimationFrame(raf);initGame();raf=requestAnimationFrame(loop);
}

function updateHUD(){
  document.getElementById('score-disp').textContent=score;
  document.getElementById('hi-disp').textContent=hiScore;
  document.getElementById('wave-disp').textContent=wave;
  let lr=document.getElementById('lives-row');lr.innerHTML='';
  for(let i=0;i<lives;i++)lr.innerHTML+='<span class="life-ship">▲</span>';
}

function flashScore(x,y,txt){
  let layer=document.getElementById('score-flash-layer');
  let el=document.createElement('div');
  el.style.cssText=`position:absolute;font-size:8px;color:#FFD700;font-family:'Press Start 2P',monospace;pointer-events:none;left:${x}px;top:${y-10}px;`;
  el.textContent=txt;layer.appendChild(el);
  let start=Date.now();
  let anim=setInterval(()=>{
    let t=(Date.now()-start)/600;el.style.transform=`translateY(${-20*t}px)`;el.style.opacity=1-t;
    if(t>=1){clearInterval(anim);el.remove();}
  },16);
}

document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

const sCanvas=document.getElementById('stars-canvas'),sCtx=sCanvas.getContext('2d');
let starsList=Array.from({length:80},()=>({x:Math.random()*480,y:Math.random()*580,s:Math.random()*1.5+0.5,sp:Math.random()*0.3+0.1,b:Math.random()}));
function animateStars(){
  sCtx.clearRect(0,0,480,580);
  starsList.forEach(s=>{
    s.y+=s.sp;if(s.y>580){s.y=0;s.x=Math.random()*480;}
    s.b+=0.02;sCtx.fillStyle=`rgba(255,255,255,${0.4+0.4*Math.sin(s.b)})`;
    sCtx.fillRect(s.x,s.y,s.s,s.s);
  });
  requestAnimationFrame(animateStars);
}
animateStars();

document.getElementById('insert-coin-btn').addEventListener('click',()=>{
  document.getElementById('msg-overlay').style.display='none';
  document.getElementById('payment-overlay').style.display='flex';
  if(!stripe)initStripe();
});

document.getElementById('pay-now-btn').addEventListener('click',handlePayment);

document.getElementById('admin-submit').addEventListener('click',()=>{
  let val=document.getElementById('admin-input').value;
  let msg=document.getElementById('admin-msg');
  if(hashCode(val)===ADMIN_HASH){
    msg.style.color='#0f0';msg.textContent='✓ ACCESS GRANTED';
    setTimeout(()=>launchGame(),600);
  } else {
    msg.style.color='#f00';msg.textContent='✗ INVALID CODE';
    document.getElementById('admin-input').value='';
    setTimeout(()=>msg.textContent='',1500);
  }
});

document.getElementById('admin-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')document.getElementById('admin-submit').click();
});

document.getElementById('back-btn').addEventListener('click',()=>{
  document.getElementById('payment-overlay').style.display='none';
  document.getElementById('msg-overlay').style.display='flex';
});

ctx.clearRect(0,0,W,H);
</script>
</body>
</html>
